name: CI — Lint & Build Check

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-frontend:
    name: Lint Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Run lint
        run: npm run lint
        working-directory: web

  build-docker-images:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          tags: kisan-mitra/web:test

      - name: Build API Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: kisan-mitra/api-gateway:test

      - name: Build Advisory Service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/advisory-service
          push: false
          tags: kisan-mitra/advisory-service:test

      - name: Build Data Service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/data-service
          push: false
          tags: kisan-mitra/data-service:test

      - name: Build Chatbot Service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/chatbot-service
          push: false
          tags: kisan-mitra/chatbot-service:test
