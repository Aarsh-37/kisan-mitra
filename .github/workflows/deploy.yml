name: CD — Deploy to Render

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --show-error \
            -o /dev/null \
            -w "Deploy triggered. HTTP status: %{http_code}\n"
